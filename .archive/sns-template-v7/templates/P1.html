<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="theme-vars.css">
<style>
.canvas {
  width: 1080px;
  height: 1080px;
  background: var(--bg);
  padding: var(--safe-area);
  position: relative;
  overflow: hidden;
}

/* T1-T3（brand variant）*/
.canvas[data-variant="brand"] .hook-num {
  font-family: var(--font-serif-en);
  font-size: 380px;
  color: var(--accent);
  font-weight: 400;
  line-height: 1;
  position: absolute;
  top: 160px;
  left: 80px;
  letter-spacing: -0.02em;
}
.canvas[data-variant="brand"] .hook-title {
  font-family: var(--font-serif-jp);
  font-size: 72px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  position: absolute;
  bottom: 200px;
  left: 80px;
  right: 80px;
  word-break: keep-all;
}

/* T4-T10（case variant）*/
.canvas[data-variant="case"] .hero-image {
  width: 100%;
  height: 580px;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}
.canvas[data-variant="case"] .hero-overlay {
  width: 100%;
  height: 580px;
  background: linear-gradient(180deg, rgba(42,40,38,0.20) 0%, rgba(42,40,38,0.90) 100%);
  position: absolute;
  top: 0;
  left: 0;
}
.canvas[data-variant="case"] .bg-typo {
  position: absolute;
  bottom: 300px;
  left: 60px;
  font-family: var(--font-serif-en);
  color: var(--accent);
  opacity: 0.12;
  font-size: 400px;
  font-weight: 400;
  line-height: 0.8;
  letter-spacing: -0.02em;
}
.canvas[data-variant="case"] .hook-title {
  position: absolute;
  bottom: 200px;
  left: 80px;
  right: 80px;
  font-family: var(--font-serif-jp);
  font-size: 80px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  word-break: keep-all;
}

/* T11（service variant）*/
.canvas[data-variant="service"] .hook-price {
  font-family: var(--font-serif-en);
  font-size: 220px;
  color: var(--accent);
  font-weight: 400;
  position: absolute;
  top: 220px;
  left: 80px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.canvas[data-variant="service"] .hook-price-unit {
  font-family: var(--font-serif-en);
  font-size: 32px;
  color: var(--accent);
  font-weight: 400;
  position: absolute;
  top: 330px;
  left: 540px;
}
.canvas[data-variant="service"] .hook-title {
  position: absolute;
  bottom: 200px;
  left: 80px;
  right: 80px;
  font-family: var(--font-serif-jp);
  font-size: 68px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  word-break: keep-all;
}

/* 共通要素 */
.swipe-indicator {
  position: absolute;
  right: 44px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  font-family: var(--font-serif-en);
  font-size: 40px;
  font-weight: 400;
}
.mini-logo {
  position: absolute;
  left: 80px;
  bottom: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.06em;
  opacity: 0.6;
}
.page-number {
  position: absolute;
  right: 80px;
  top: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 22px;
  font-weight: 400;
  opacity: 0.6;
}
</style>
</head>
<body data-template="{{template_id}}">
<div class="canvas" data-variant="{{variant}}">
{{hero_block}}
{{hook_block}}
<div class="swipe-indicator">→</div>
<div class="mini-logo">NovaTech.</div>
<div class="page-number">1/4</div>
</div>
</body>
</html>
