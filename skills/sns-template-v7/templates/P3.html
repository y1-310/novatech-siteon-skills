<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="theme-vars.css">
<style>
.canvas {
  width: 1080px;
  height: 1080px;
  background: var(--bg);
  padding: var(--safe-area);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 背景タイポ（T1-T3: POINT / T4-T10: 業種英字） */
.bg-typo {
  position: absolute;
  font-family: var(--font-serif-en);
  color: var(--accent);
  opacity: 0.10;
  font-size: 260px;
  font-weight: 400;
  line-height: 0.8;
  letter-spacing: -0.02em;
  bottom: 220px;
  left: 60px;
  pointer-events: none;
}

.heading {
  font-family: var(--font-serif-jp);
  font-size: 64px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 40px;
  word-break: keep-all;
  position: relative;
  z-index: 1;
}

.divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}

/* T1-T3: body_paragraphs */
.body-paragraphs {
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
  z-index: 1;
}
.body-para {
  font-family: var(--font-sans-jp);
  font-size: 36px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.8;
  word-break: keep-all;
}

/* T4-T10: lighthouse scores */
.lighthouse-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
  position: relative;
  z-index: 1;
}
.lh-item {
  background: rgba(196,162,101,0.12);
  border-radius: 12px;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.lh-score {
  font-family: var(--font-serif-en);
  font-size: 80px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}
.lh-label {
  font-family: var(--font-sans-jp);
  font-size: 22px;
  font-weight: 400;
  color: var(--text);
  opacity: 0.7;
}
.demo-url {
  font-family: var(--font-serif-en);
  font-size: 30px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0.02em;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.supplement {
  font-family: var(--font-sans-jp);
  font-size: 30px;
  font-weight: 400;
  color: var(--text);
  opacity: 0.8;
  position: relative;
  z-index: 1;
}

/* T11: features */
.features-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  position: relative;
  z-index: 1;
}
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 20px 24px;
  background: rgba(42,40,38,0.06);
  border-radius: 10px;
}
.feature-check {
  color: var(--accent);
  font-size: 28px;
  flex-shrink: 0;
  margin-top: 2px;
}
.feature-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.feature-name {
  font-family: var(--font-sans-jp);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.feature-desc {
  font-family: var(--font-sans-jp);
  font-size: 22px;
  font-weight: 400;
  color: var(--text);
  opacity: 0.65;
  line-height: 1.4;
}

/* スワイプ誘導 */
.swipe-indicator {
  position: absolute;
  right: 44px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  font-family: var(--font-serif-en);
  font-size: 40px;
  font-weight: 400;
}

.page-number {
  position: absolute;
  right: 80px;
  top: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 22px;
  font-weight: 400;
  opacity: 0.6;
}
.mini-logo {
  position: absolute;
  left: 80px;
  bottom: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.06em;
  opacity: 0.6;
}
</style>
</head>
<body data-template="{{template_id}}">
<div class="canvas" data-variant="{{variant}}">
  {{bg_typo_block}}
  <h2 class="heading">{{heading}}</h2>
  <div class="divider"></div>
  {{p3_content}}
  <div class="swipe-indicator">→</div>
  <div class="page-number">3/4</div>
  <div class="mini-logo">NovaTech.</div>
</div>
</body>
</html>
