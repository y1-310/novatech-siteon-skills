<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="theme-vars.css">
<style>
.canvas {
  width: 1080px;
  height: 1080px;
  background: var(--bg);
  padding: var(--safe-area);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 背景タイポ（T1-T3: ISSUE / T4-T10: 業種英字） */
.bg-typo {
  position: absolute;
  font-family: var(--font-serif-en);
  color: var(--accent);
  opacity: 0.12;
  font-size: 280px;
  font-weight: 400;
  line-height: 0.8;
  letter-spacing: -0.02em;
  bottom: 240px;
  left: 60px;
  pointer-events: none;
}

.question {
  font-family: var(--font-serif-jp);
  font-size: 72px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 56px;
  word-break: keep-all;
  position: relative;
  z-index: 1;
}

.divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 48px;
  position: relative;
  z-index: 1;
}

.pain-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: relative;
  z-index: 1;
}

.pain-item {
  display: flex;
  align-items: center;
  gap: 24px;
}

.pain-icon {
  color: var(--accent);
  font-family: var(--font-serif-en);
  font-size: 28px;
  font-weight: 400;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  line-height: 1;
}

.pain-text {
  font-family: var(--font-sans-jp);
  font-size: 40px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  word-break: keep-all;
}

/* スワイプ誘導 */
.swipe-indicator {
  position: absolute;
  right: 44px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  font-family: var(--font-serif-en);
  font-size: 40px;
  font-weight: 400;
}

.page-number {
  position: absolute;
  right: 80px;
  top: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 22px;
  font-weight: 400;
  opacity: 0.6;
}
.mini-logo {
  position: absolute;
  left: 80px;
  bottom: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.06em;
  opacity: 0.6;
}
</style>
</head>
<body data-template="{{template_id}}">
<div class="canvas" data-variant="{{variant}}">
  {{bg_typo_block}}
  <h2 class="question">{{question}}</h2>
  <div class="divider"></div>
  <ul class="pain-list">
    {{pain_items}}
  </ul>
  <div class="swipe-indicator">→</div>
  <div class="page-number">2/4</div>
  <div class="mini-logo">NovaTech.</div>
</div>
</body>
</html>
