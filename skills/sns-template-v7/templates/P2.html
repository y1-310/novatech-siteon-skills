<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="theme-vars.css">
<style>
.canvas {
  width: 1080px;
  height: 1080px;
  background: var(--bg);
  padding: var(--safe-area);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.question {
  font-family: var(--font-serif-jp);
  font-size: 54px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 72px;
  word-break: keep-all;
}

.pain-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.pain-item {
  display: flex;
  align-items: center;
  gap: 28px;
}

.pain-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.pain-text {
  font-family: var(--font-sans-jp);
  font-size: 44px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.5;
  word-break: keep-all;
}

.divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 56px;
}

.page-number {
  position: absolute;
  right: 80px;
  top: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 22px;
  font-weight: 400;
  opacity: 0.6;
}
.mini-logo {
  position: absolute;
  left: 80px;
  bottom: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.06em;
  opacity: 0.6;
}
</style>
</head>
<body data-template="{{template_id}}">
<div class="canvas" data-variant="{{variant}}">
  <h2 class="question">{{question}}</h2>
  <div class="divider"></div>
  <ul class="pain-list">
    {{pain_items}}
  </ul>
  <div class="page-number">2/4</div>
  <div class="mini-logo">NovaTech.</div>
</div>
</body>
</html>
