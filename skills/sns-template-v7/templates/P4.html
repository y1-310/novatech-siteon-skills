<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="theme-vars.css">
<style>
.canvas {
  width: 1080px;
  height: 1080px;
  background: var(--bg);
  padding: var(--safe-area);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.summary-title {
  font-family: var(--font-serif-jp);
  font-size: 64px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 16px;
  word-break: keep-all;
}

.summary-sub {
  font-family: var(--font-serif-en);
  font-size: 36px;
  font-weight: 400;
  color: var(--accent);
  margin-bottom: 60px;
  letter-spacing: 0.06em;
}

.divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 60px;
}

/* 通常CTA（T1-T10） */
.cta-button {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-sans-jp);
  font-size: 40px;
  font-weight: 700;
  padding: 32px 56px;
  border-radius: 60px;
  margin-bottom: 56px;
  align-self: flex-start;
}
.cta-icon {
  font-size: 36px;
}

/* T11 CTA（URLのみ） */
.service-url {
  font-family: var(--font-serif-en);
  font-size: 120px;
  font-weight: 400;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}
.service-sub-text {
  font-family: var(--font-sans-jp);
  font-size: 32px;
  font-weight: 400;
  color: var(--text);
  opacity: 0.7;
  margin-bottom: 48px;
}

.next-preview {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--font-sans-jp);
  font-size: 30px;
  font-weight: 400;
  color: var(--text);
  opacity: 0.6;
}
.next-label {
  font-family: var(--font-serif-en);
  font-size: 22px;
  color: var(--accent);
  font-weight: 400;
  letter-spacing: 0.04em;
}

.page-number {
  position: absolute;
  right: 80px;
  top: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 22px;
  font-weight: 400;
  opacity: 0.6;
}
.mini-logo {
  position: absolute;
  left: 80px;
  bottom: 80px;
  color: var(--text);
  font-family: var(--font-serif-en);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.06em;
  opacity: 0.6;
}
</style>
</head>
<body data-template="{{template_id}}">
<div class="canvas" data-variant="{{variant}}">
  <h2 class="summary-title">{{summary_title}}</h2>
  {{summary_sub_block}}
  <div class="divider"></div>
  {{cta_block}}
  <div class="next-preview">
    <span class="next-label">NEXT</span>
    <span>{{next_preview}}</span>
  </div>
  <div class="page-number">4/4</div>
  <div class="mini-logo">NovaTech.</div>
</div>
</body>
</html>
